<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact the SHARPS team</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 20px;
            background: #0366d6;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }

        button:hover {
            background: #024ea2;
        }
    </style>
</head>
<body>

<h1>Contact the SHARPS team</h1>

<form
    action="https://formspree.io/f/mgojpeen"
    method="POST">

    <label for="name">Name</label>
    <input
        id="name"
        type="text"
        name="name"
        required>

    <label for="email">Email</label>
    <input
        id="email"
        type="email"
        name="email"
        required>

    <label for="subject">Subject</label>
    <input
        id="subject"
        type="text"
        name="subject">

    <label for="message">Message</label>
    <textarea
        id="message"
        name="message"
        rows="6"
        required></textarea>

    <button type="submit">Send Message</button>

</form>

</body>
</html>
